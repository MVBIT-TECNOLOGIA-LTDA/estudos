<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada Acadêmica</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-content">
        <div class="container">

            <!-- Header -->
            <div class="header">
                <div class="header-left">
                    <h1>Jornada Acadêmica</h1>
                    <div id="connectionStatus" class="connection-status offline">
                        <span class="status-dot"></span>
                    </div>
                </div>
                <button onclick="toggleForm()" class="btn-new-order-header">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Novo Estudo
                </button>
            </div>

            <!-- Dashboard Cards (3 cards — sem Revisão) -->
            <div class="dashboard-grid">
                <div class="stat-card" onclick="abrirModalDashboard('finalizados')" style="cursor:pointer;">
                    <div class="stat-icon stat-icon-success">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-value stat-value-success" id="dashboardFinalizados">0</div>
                        <div class="stat-label">Finalizados</div>
                    </div>
                </div>

                <div class="stat-card" onclick="abrirModalDashboard('fora-prazo')" style="cursor:pointer;" id="cardForaPrazo">
                    <div class="stat-icon stat-icon-warning">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-value stat-value-warning" id="dashboardForaPrazo">0</div>
                        <div class="stat-label">Fora do Prazo</div>
                    </div>
                </div>

                <div class="stat-card" onclick="abrirModalDashboard('programados')" style="cursor:pointer;">
                    <div class="stat-icon stat-icon-default">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-value" id="dashboardProgramados">0</div>
                        <div class="stat-label">Programados</div>
                    </div>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="search-bar-wrapper">
                <div class="search-bar">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" id="search" placeholder="Pesquisar" oninput="filterStudies()">

                    <div class="search-bar-filters">
                        <div class="filter-dropdown-inline">
                            <select id="filterMateria" onchange="filterStudies()">
                                <option value="">Todas Matérias</option>
                            </select>
                            <svg class="dropdown-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                        <div class="filter-dropdown-inline">
                            <select id="filterFormacao" onchange="filterStudies()">
                                <option value="">Todas Formações</option>
                            </select>
                            <svg class="dropdown-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                        <div class="filter-dropdown-inline">
                            <select id="filterStatus" onchange="filterStudies()">
                                <option value="">Todos os Status</option>
                                <option value="finalizado">Finalizado</option>
                                <option value="fora-prazo">Fora do Prazo</option>
                                <option value="programado">Programado</option>
                            </select>
                            <svg class="dropdown-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                        <div class="month-navigation-inline">
                            <button onclick="changeMonth(-1)" class="month-nav-arrow" title="Mês anterior">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="15 18 9 12 15 6"></polyline>
                                </svg>
                            </button>
                            <div class="month-display-inline">
                                <span id="currentMonth">Carregando...</span>
                            </div>
                            <button onclick="changeMonth(1)" class="month-nav-arrow" title="Próximo mês">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button class="calendar-btn" onclick="toggleCalendar()" title="Selecionar dia">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                    </button>
                    <button class="calendar-btn" onclick="carregarTudo()" title="Atualizar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                        </svg>
                    </button>
                </div>

                <!-- Tabela -->
                <div class="card table-card">
                    <div style="overflow-x:auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width:50px;"></th>
                                    <th>Matéria</th>
                                    <th>Formação</th>
                                    <th>Unidade</th>
                                    <th>Conteúdo</th>
                                    <th>Questões</th>
                                    <th>Desempenho</th>
                                    <th>Status</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="estudosTableBody">
                                <tr><td colspan="9" style="text-align:center;padding:2rem;">Carregando...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL CALENDÁRIO (dias) -->
    <div class="calendar-modal" id="calendarModal">
        <div class="calendar-content">
            <div class="calendar-header">
                <button class="calendar-year-nav" onclick="changeCalendarMonth(-1)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <h3 id="calendarMonthYear">—</h3>
                <button class="calendar-year-nav" onclick="changeCalendarMonth(1)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>
            <div class="calendar-weekdays">
                <span>Dom</span><span>Seg</span><span>Ter</span>
                <span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
            </div>
            <div class="calendar-days" id="calendarDays"></div>
        </div>
    </div>

    <!-- MODAL FORMULÁRIO -->
    <div class="modal-overlay" id="formModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="formTitle">Novo Estudo</h3>
                <button class="close-modal" onclick="closeFormModal(true)">✕</button>
            </div>

            <div class="tabs-container">
                <div class="tabs-nav">
                    <button class="tab-btn active" onclick="switchTab('tab-geral')">Geral</button>
                    <button class="tab-btn" onclick="switchTab('tab-questoes')">Questões</button>
                </div>

                <form id="studyForm" onsubmit="saveStudy(event)">
                    <input type="hidden" id="editId" value="">

                    <!-- Aba Geral -->
                    <div class="tab-content active" id="tab-geral">
                        <div class="form-grid">

                            <!-- Matéria com botão + -->
                            <div class="form-group">
                                <label for="materia">Matéria</label>
                                <div class="input-with-btn">
                                    <select id="materia">
                                        <option value="">Selecione uma matéria</option>
                                    </select>
                                    <button type="button" class="btn-add-inline" onclick="openNewMateriaModal()" title="Adicionar matéria">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                            <line x1="12" y1="5" x2="12" y2="19"></line>
                                            <line x1="5" y1="12" x2="19" y2="12"></line>
                                        </svg>
                                    </button>
                                </div>
                            </div>

                            <!-- Formação com botão + -->
                            <div class="form-group">
                                <label for="formacao">Formação</label>
                                <div class="input-with-btn">
                                    <select id="formacao">
                                        <option value="">Selecione uma formação</option>
                                    </select>
                                    <button type="button" class="btn-add-inline" onclick="openNewFormacaoModal()" title="Adicionar formação">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                            <line x1="12" y1="5" x2="12" y2="19"></line>
                                            <line x1="5" y1="12" x2="19" y2="12"></line>
                                        </svg>
                                    </button>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="unidade">Unidade</label>
                                <input type="text" id="unidade">
                            </div>
                            <div class="form-group">
                                <label for="conteudo">Conteúdo</label>
                                <input type="text" id="conteudo">
                            </div>
                            <div class="form-group">
                                <label for="data_estudo">Data</label>
                                <input type="date" id="data_estudo">
                            </div>
                        </div>
                    </div>

                    <!-- Aba Questões -->
                    <div class="tab-content" id="tab-questoes">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="quantidade">Quantidade de Questões</label>
                                <input type="number" id="quantidade" min="0" step="1">
                            </div>
                            <div class="form-group">
                                <label for="total_acertos">Total de Acertos</label>
                                <input type="number" id="total_acertos" min="0" step="1">
                            </div>
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button type="button" id="btnPrevious" onclick="previousTab()" class="secondary" style="display:none;">Anterior</button>
                        <button type="button" id="btnNext" onclick="nextTab()" class="secondary">Próximo</button>
                        <button type="submit" id="btnSave" class="save" style="display:none;">Salvar</button>
                        <button type="button" onclick="closeFormModal(true)" class="secondary">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL NOVA MATÉRIA -->
    <div class="modal-overlay" id="newMateriaModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3 class="modal-title">Criar Nova Matéria</h3>
                <button class="close-modal" onclick="closeNewMateriaModal()">✕</button>
            </div>
            <div class="form-group">
                <label for="nomeMateria">Nome da Matéria</label>
                <input type="text" id="nomeMateria" placeholder="Ex: MATEMÁTICA, FÍSICA...">
            </div>
            <div class="modal-actions">
                <button type="button" onclick="closeNewMateriaModal()" class="secondary">Cancelar</button>
                <button type="button" onclick="saveNewMateria()" class="success">Criar</button>
            </div>
        </div>
    </div>

    <!-- MODAL NOVA FORMAÇÃO -->
    <div class="modal-overlay" id="newFormacaoModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3 class="modal-title">Criar Nova Formação</h3>
                <button class="close-modal" onclick="closeNewFormacaoModal()">✕</button>
            </div>
            <div class="form-group">
                <label for="nomeFormacao">Nome da Formação</label>
                <input type="text" id="nomeFormacao" placeholder="Ex: ENGENHARIA, MEDICINA...">
            </div>
            <div class="modal-actions">
                <button type="button" onclick="closeNewFormacaoModal()" class="secondary">Cancelar</button>
                <button type="button" onclick="saveNewFormacao()" class="success">Criar</button>
            </div>
        </div>
    </div>

    <!-- MODAL CONFIRMAÇÃO DE EXCLUSÃO -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-content modal-small modal-delete">
            <button class="close-modal" onclick="closeDeleteModal()">✕</button>
            <div class="modal-message-delete" id="deleteMessage">Tem certeza que deseja excluir este estudo?</div>
            <div class="modal-actions modal-actions-no-border">
                <button type="button" onclick="confirmDelete()" class="danger">Sim</button>
                <button type="button" onclick="closeDeleteModal()" class="secondary">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- MODAL DASHBOARD -->
    <div class="modal-overlay" id="dashboardModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="dashboardModalTitle">Itens</h3>
                <button class="close-modal" onclick="closeDashboardModal()">✕</button>
            </div>
            <div id="dashboardModalBody" style="max-height:400px;overflow-y:auto;"></div>
            <div class="modal-actions">
                <button type="button" onclick="closeDashboardModal()" class="secondary">Fechar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="calendar.js"></script>
</body>
</html>
